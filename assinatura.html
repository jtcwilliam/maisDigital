<body>

  <h2>Assinatura Digital (Traço Contínuo)</h2>

  <canvas id="signatureCanvas" width="600" height="300"></canvas>

  <div class="buttons">
    <button onclick="clearCanvas()">Limpar</button>
    <button onclick="saveSignature()">Salvar</button>
  </div>

  <h3>Assinatura Salva:</h3>

 
        <img id="savedImage" alt="Assinatura aparecerá aqui"/>


 
    <button type="submit" onclick="inserirUsuario()" >Enviar Imagem</button>
 

       

  <script>

 

function pegarAss(){

}


  function inserirUsuario() {

    var assinatura = $("#savedImage").attr("src");

    


    //console.log(assinatura);
    
     

            
                var formData = {
                assinatura
                };
                var condicao;
                $.ajax({
                        type: 'POST',
                        url: 'ajax/salvaAssinaturaController.php',
                        data: formData,
                        dataType: 'html',
                        encode: true
                    })
                    .done(function(data) {

                        console.log(data);

                       

                    });
         
            event.preventDefault();
        }


 

    const canvas = document.getElementById('signatureCanvas');
    const ctx = canvas.getContext('2d');

    let drawing = false;

    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';

    function getCoords(e) {
      const rect = canvas.getBoundingClientRect();
      if (e.touches && e.touches.length > 0) {
        return {
          x: e.touches[0].clientX - rect.left,
          y: e.touches[0].clientY - rect.top
        };
      } else {
        return {
          x: e.clientX - rect.left,
          y: e.clientY - rect.top
        };
      }
    }

    function startDrawing(e) {
      const { x, y } = getCoords(e);
      drawing = true;
      ctx.beginPath();
      ctx.moveTo(x, y);
      e.preventDefault();
    }

    function draw(e) {
      if (!drawing) return;
      const { x, y } = getCoords(e);
      ctx.lineTo(x, y);
      ctx.stroke();
      e.preventDefault();
    }

    function stopDrawing() {
      drawing = false;
    }

    // Eventos para mouse
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mouseleave', stopDrawing);

    // Eventos para toque
    canvas.addEventListener('touchstart', startDrawing);
    canvas.addEventListener('touchmove', draw);
    canvas.addEventListener('touchend', stopDrawing);
    canvas.addEventListener('touchcancel', stopDrawing);

    function clearCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function saveSignature() {
      const imageData = canvas.toDataURL('image/png');
      
      document.getElementById('savedImage').src = imageData;
    }
  </script>
</body>
